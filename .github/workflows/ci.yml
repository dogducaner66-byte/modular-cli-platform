name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Targeted tests
        run: npm test -- tests/types.test.ts tests/config.test.ts tests/loader.test.ts tests/cli.test.ts tests/commands/version.test.ts

      - name: Build
        run: npm run build

      - name: Package smoke test
        run: npm pack --dry-run

      - name: Validate shipped commands
        run: npm run verify:commands
